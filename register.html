<!DOCTYPE html>
<html>

<head>
    <title>register</title>
</head>

<body>
    <header>
        <h1>👩🏻‍💻 사용자 등록 신청서 👩🏻‍💻</h1>
        <style>
        h1 {
            color : white ;
            background : #F4C2C2 ;
        }
        </style>
    </header>
    <hr>

    <main>
        <section>
            <article> 
                <h2>회원가입을 위해 정보를 입력해주세요. 😊</h2>
                <form action="#" method="post">
                    <fieldset>
                        <legend><b>기본 정보 (Essential)</b></legend>
                        
                        <label for="id">아이디</label><br>
                        <input type="text" id="id" name="id" placeholder="4~12자 영문/숫자"><br><br>
                        <label for="pw">비밀번호</label><br>
                        <input type="password" id="pw" name="pw"><br><br>
                        <label for="email">이메일</label><br>
                        <input type="email" id="email" name="email"><br><br>
                    </fieldset>
                </form>
            </article><br>

            <article>
                <form action="#" method="post">
                    <fieldset>
                         <label for="phone">연락처</label><br>
                         <input type="tel" id="phone" name="phone" 
                         pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"
                         placeholder="010-1234-5678"><br><br>
                         
                         <label>관심 분야</label><br>
                         <input type="checkbox" id="HTML5" name="interest" value="HTML5">
                         <label for="HTML5">HTML5</label>
                         <input type="checkbox" id="CSS3" name="interest" value="CSS3">
                         <label for="CSS3">CSS3</label>
                         <input type="checkbox" id="JavaScript" name="interest" value="JavaScript">
                         <label for="JavaScript">JavaScript</label><br><br>
                         
                         <label for="skill">숙련도</label>
                         <input type="range" id="skill" name="skill"
                          min="0" max="100" step="10"><br><br>

                    </fieldset><br>
                    <input type="submit" value="가입신청">
                    <input type="reset" value="초기화">
                </form>
            </article>

        </section>
    </main>

    <hr>
    <footer>
        <nav>
            <a href = "A1_Lab01_HTML_김민아.html">메인으로 돌아가기</a>

             a {
                 color: #F4C2C2;
             }
             </style>
        </ul>
        </nav>
        <p>© 2026 김민아. All rights reserved.</p>
    </footer>
</body>
